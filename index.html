    <script>
      // Registro de Service Worker ultra-robusto
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          try {
            // Usar ruta relativa directa sin constructores URL complejos
            navigator.serviceWorker.register('./sw.js', { scope: './' })
              .then(reg => console.log('PWA Lista:', reg.scope))
              .catch(err => console.warn('PWA no disponible en este entorno.'));
          } catch (e) {
            console.warn('Fallo silencioso en registro de SW');
          }
        });
      }
